   history:'El Castillo San Felipe de Barajas, ubicado en la cima del cerro de San Lázaro, es la mayor fortaleza construida por España en América. Su construcción inició en 1536 bajo el reinado de Felipe II y fue ampliado entre 1657 y 1769.\n\nEl ingeniero militar Antonio de Arévalo diseñó su complejo sistema de galerías subterráneas que corren bajo el cerro. La acústica es tan perfecta que un susurro se escucha claramente a 100 metros.\n\nEn 1741, el almirante inglés Edward Vernon atacó con 186 barcos y 30.000 soldados. Blas de Lezo, con solo 6 navíos y 3.000 hombres, lo rechazó en uno de los mayores triunfos navales de España.\n\nLa leyenda cuenta que los piratas Francis Drake y John Hawkins nunca pudieron tomarlo. Hoy sus 47.625 m² de área son recorridos por millones de visitantes.\n\nDeclarado Patrimonio de la Humanidad por la UNESCO en 1984 junto al centro histórico de Cartagena.',

  {id:'plaza-botero',name:'Plaza Botero',city:'Medellín',rating:4.5,category:'historia',mainImage:'https://picsum.photos/seed/plazabotero/800/500',photos:['https://picsum.photos/seed/plazabotero/600/400','https://picsum.photos/seed/plazaboteroa/600/400','https://picsum.photos/seed/plazaboterob/600/400','https://picsum.photos/seed/plazaboteroc/600/400'],description:'23 esculturas monumentales de Fernando Botero al aire libre.',history:'Plaza al aire libre frente al Museo de Antioquia con 23 esculturas monumentales donadas por Botero en el año 2000.\n\nBotero (Medellín, 1932) es el artista colombiano más reconocido internacionalmente.\n\nLa donación transformó completamente esta zona del centro.\n\nCada escultura pesa entre 800 kg y varias toneladas.',curiosities:[{text:'Botero donó 23 esculturas y 187 obras más.'},{text:'La escultura más pesada: más de 6 toneladas.'},{text:'Es el punto más fotografiado de Medellín.'},{text:'El Museo de Antioquia fue la antigua Alcaldía.'},{text:'Colección valorada en +200 millones USD.'}],routes:[{name:'Arte en el Centro',duration:'2 h',distance:'2.5 km',difficulty:'Fácil'},{name:'Cultural Walking Tour',duration:'3 h',distance:'4 km',difficulty:'Fácil'},{name:'Botero al Parque Berrío',duration:'1 h',distance:'1 km',difficulty:'Fácil'}],restaurants:[{name:'Hacienda Junín',cuisine:'Antioqueña tradicional',rating:4.4},{name:"Mondongo's",cuisine:'Típica paisa',rating:4.3},{name:'El Herbario',cuisine:'Vegetariana',rating:4.5}]},
  {id:'el-penol',name:'Piedra del Peñol',city:'Medellín',rating:4.8,category:'naturaleza',mainImage:'https://picsum.photos/seed/penolguatape/800/500',photos:['https://picsum.photos/seed/penolguatape/600/400','https://picsum.photos/seed/penolguatapea/600/400','https://picsum.photos/seed/penolguatapeb/600/400','https://picsum.photos/seed/penolguatapec/600/400'],description:'Monolito de 220m con 740 escalones y vista panorámica.',history:'Monolito de granito de 220m sobre el suelo a 80 km de Medellín. 740 peldaños incrustados en una grieta de la roca.\n\n70 millones de años, 10 millones de toneladas. Los Tahamíes la llamaban "Moijcá".\n\nDesde la cima: vista panorámica del embalse de Guatapé (1970).\n\nPrimera escalada en 1954 por Luis Eduardo Villegas (5 días con estacas de madera).',curiosities:[{text:'Pesa ~10 millones de toneladas.'},{text:'Exactamente 740 escalones.'},{text:'Vista hasta 100 km a la redonda.'},{text:'Primera escalada tomó 5 días (1954).'},{text:'La disputa G/U pintadas: Guatapé vs El Peñol.'}],routes:[{name:'Subida a la Cima',duration:'45 min',distance:'0.5 km',difficulty:'Moderada'},{name:'Lancha por Embalse',duration:'2 h',distance:'15 km',difficulty:'Fácil'},{name:'Peñol + Guatapé',duration:'6 h',distance:'10 km',difficulty:'Moderada'}],restaurants:[{name:'El Peñol',cuisine:'Típica antioqueña',rating:4.2},{name:'Lake View',cuisine:'Trucha y mariscos',rating:4.4},{name:'Mi Casa Guatapé',cuisine:'Casera colombiana',rating:4.3}]},
  {id:'comuna-13',name:'Comuna 13',city:'Medellín',rating:4.7,category:'historia',mainImage:'https://picsum.photos/seed/comuna13mde/800/500',photos:['https://picsum.photos/seed/comuna13mde/600/400','https://picsum.photos/seed/comuna13mdea/600/400','https://picsum.photos/seed/comuna13mdeb/600/400','https://picsum.photos/seed/comuna13mdec/600/400'],description:'De zona de conflicto a epicentro del arte urbano.',history:'Antes una de las zonas más violentas del mundo.\n\nEn 2011 se inauguraron las primeras escaleras eléctricas al aire libre del mundo en un barrio informal.\n\nMás de 250 murales narran la historia de resiliencia.\n\nHoy es uno de los destinos más visitados de Colombia.',curiosities:[{text:'El hip-hop fue clave en la transformación social.'},{text:'Primeras escaleras eléctricas al aire libre del mundo.'},{text:'Más de 250 murales adornan las calles.'},{text:'De la zona más peligrosa a la más visitada.'},{text:'Shows de breakdance callejero diarios.'}],routes:[{name:'Grafiti y Escaleras',duration:'2.5 h',distance:'2 km',difficulty:'Fácil'},{name:'Historia y Memoria',duration:'3 h',distance:'3 km',difficulty:'Moderada'},{name:'Food Tour',duration:'2 h',distance:'1.5 km',difficulty:'Fácil'}],restaurants:[{name:'Comedor Comunitario',cuisine:'Casera del barrio',rating:4.5},{name:'La Terraza',cuisine:'Street food',rating:4.3},{name:'Café del Barrio',cuisine:'Café de origen',rating:4.4}]},
  {id:'parque-tayrona',name:'Parque Tayrona',city:'Santa Marta',rating:4.9,category:'naturaleza',mainImage:'https://picsum.photos/seed/parquetayrona/800/500',photos:['https://picsum.photos/seed/parquetayrona/600/400','https://picsum.photos/seed/parquetayronaa/600/400','https://picsum.photos/seed/parquetayronab/600/400','https://picsum.photos/seed/parquetayronac/600/400'],description:'Donde la selva tropical se encuentra con el Caribe.',history:'El Parque Nacional Natural Tayrona, creado en 1969, protege 15.000 hectáreas terrestres y 4.500 marinas en el piedemonte de la Sierra Nevada de Santa Marta.\n\nEl parque fue habitado por la civilización Tayrona entre los siglos I y XVI, cuyos descendientes, los pueblos Kogui, Wiwa, Arhuaco y Kankuamo, aún consideran sagrado este territorio.\n\nAlberga 770+ especies de plantas, 396 de aves y 36 de murciélagos. Sus playas —Cabo San Juan del Guía, Arrecifes, La Piscina— están entre las más bellas del mundo.\n\nEl parque cierra periódicamente en semana de octubre para el ritual Kogui del "pagamento a la tierra", una ceremonia de agradecimiento al universo que preserva el equilibrio de la naturaleza.\n\nEn 2015 fue declarado Reserva de la Biosfera por la UNESCO.',curiosities:[{text:'770+ especies de plantas en 15,000 ha.'},{text:'Cabo San Juan: top 10 playas de Sudamérica.'},{text:'Los Kogui realizan rituales sagrados aquí.'},{text:'Se cierra periódicamente para recuperación.'},{text:'Hogar de monos aulladores y jaguares.'}],routes:[{name:'Sendero Cabo San Juan',duration:'4 h',distance:'9 km',difficulty:'Moderada'},{name:'Arrecifes - La Piscina',duration:'2 h',distance:'3 km',difficulty:'Fácil'},{name:'Pueblito Chairama',duration:'5 h',distance:'7 km',difficulty:'Difícil'}],restaurants:[{name:'Yuluka',cuisine:'Orgánica local',rating:4.3},{name:'Donde Gira el Viento',cuisine:'Mariscos',rating:4.1},{name:'Eco Habitats',cuisine:'Ecológica',rating:4.4}]},
  {id:'ciudad-perdida',name:'Ciudad Perdida',city:'Santa Marta',rating:4.9,category:'historia',mainImage:'https://picsum.photos/seed/ciudadperdida/800/500',photos:['https://picsum.photos/seed/ciudadperdida/600/400','https://picsum.photos/seed/ciudadperdidaa/600/400','https://picsum.photos/seed/ciudadperdidab/600/400','https://picsum.photos/seed/ciudadperdidac/600/400'],description:'650 años más antigua que Machu Picchu.',history:'Teyuna, conocida como Ciudad Perdida, fue construida alrededor del año 800 d.C. por la civilización Tayrona, 650 años antes que Machu Picchu.\n\nFue abandonada durante la conquista española en el siglo XVI y permaneció oculta bajo la selva durante siglos. En 1972, un grupo de guaqueros (cazadores de tesoros) llegó a ella siguiendo un camino de piedra y la reportó a las autoridades.\n\nLas 169 terrazas escalonadas en la ladera de la Sierra Nevada de Santa Marta fueron construidas con precisión asombrosa. El sitio tiene 1.200 m de altitud y solo se puede acceder caminando 4 a 6 días por la selva.\n\nPara los pueblos indígenas Kogui, Arhuaco, Wiwa y Kankuamo es el "corazón del mundo" y un centro ceremonial activo. Solo el 10% del sitio ha sido excavado.\n\nEs el yacimiento arqueológico más grande de Colombia y uno de los más importantes de América del Sur.',curiosities:[{text:'Construida 650 años antes que Machu Picchu.'},{text:'Solo se llega caminando 4-6 días.'},{text:'169 terrazas de piedra en la ladera.'},{text:'Solo se ha descubierto el 10%.'},{text:'4 pueblos indígenas descienden de los constructores.'}],routes:[{name:'Trek 4 días',duration:'4 días',distance:'44 km',difficulty:'Difícil'},{name:'Trek 6 días',duration:'6 días',distance:'52 km',difficulty:'Difícil'},{name:'Ruta al Mirador',duration:'2 días',distance:'20 km',difficulty:'Moderada'}],restaurants:[{name:'Campamento Wiwa',cuisine:'Campo orgánica',rating:4.2},{name:'Teyuna',cuisine:'Tradicional sierra',rating:4.0},{name:'Donde Elisa',cuisine:'Casera samaria',rating:4.3}]},
  {id:'el-rodadero',name:'El Rodadero',city:'Santa Marta',rating:4.3,category:'naturaleza',mainImage:'https://picsum.photos/seed/elrodadero/800/500',photos:['https://picsum.photos/seed/elrodadero/600/400','https://picsum.photos/seed/elrodaderoa/600/400','https://picsum.photos/seed/elrodaderob/600/400','https://picsum.photos/seed/elrodaderoc/600/400'],description:'La playa urbana más popular de Santa Marta.',history:'Balneario en la bahía de Gaira. Nombre: deslizamientos de arena por colinas.\n\nDesde los 50s es el destino principal de playa. Aguas tranquilas para familias.\n\nDesde el muelle: lanchas a Playa Blanca.\n\nAtardecer con Sierra Nevada de fondo es espectacular.',curiosities:[{text:'Nombre: "rodar" por las dunas de arena.'},{text:'Atardeceres con Sierra Nevada famosos mundialmente.'},{text:'Zona de avistamiento de tortugas marinas.'},{text:'Festivales y conciertos cada diciembre.'},{text:'Lanchas a playas secretas por mar.'}],routes:[{name:'Paseo Malecón',duration:'1 h',distance:'2 km',difficulty:'Fácil'},{name:'Playa Blanca en Lancha',duration:'3 h',distance:'8 km',difficulty:'Fácil'},{name:'Kayak al Atardecer',duration:'2 h',distance:'4 km',difficulty:'Moderada'}],restaurants:[{name:'Donde Chucho',cuisine:'Pescados frescos',rating:4.5},{name:'Burukuka',cuisine:'Fusión caribeña',rating:4.4},{name:'Iguanas',cuisine:'Internacional',rating:4.1}]},
  {id:'monserrate',name:'Cerro de Monserrate',city:'Bogotá',rating:4.6,category:'historia',mainImage:'https://picsum.photos/seed/monserrate/800/500',photos:['https://picsum.photos/seed/monserrate/600/400','https://picsum.photos/seed/monserratea/600/400','https://picsum.photos/seed/monserrateb/600/400','https://picsum.photos/seed/monserratec/600/400'],description:'Santuario colonial a 3,152 metros de altura.',history:'A 3,152m sobre el nivel del mar. Santuario del Señor Caído desde el siglo XVII.\n\nConstruido en 1657. Miles de fieles suben cada semana.\n\nAcceso: teleférico, funicular o sendero de 2.5 km.\n\nVista panorámica de 8+ millones de habitantes.',curiosities:[{text:'3,152m: más alto que muchas montañas europeas.'},{text:'Teleférico inaugurado en 1955.'},{text:'3+ millones de peregrinos al año.'},{text:'En días claros se ven los nevados.'},{text:'Tamales y chocolate santafereño son tradición.'}],routes:[{name:'Sendero Peatonal',duration:'1.5 h',distance:'2.5 km',difficulty:'Difícil'},{name:'Teleférico + Cima',duration:'1 h',distance:'1 km',difficulty:'Fácil'},{name:'Monserrate-Guadalupe',duration:'4 h',distance:'6 km',difficulty:'Difícil'}],restaurants:[{name:'San Isidro',cuisine:'Santafereña',rating:4.4},{name:'Casa Santa Clara',cuisine:'Alta cocina',rating:4.7},{name:'Francia',cuisine:'Francesa-bogotana',rating:4.3}]},
  {id:'la-candelaria',name:'La Candelaria',city:'Bogotá',rating:4.5,category:'historia',mainImage:'https://picsum.photos/seed/candelariabog/800/500',photos:['https://picsum.photos/seed/candelariabog/600/400','https://picsum.photos/seed/candelariaboga/600/400','https://picsum.photos/seed/candelariabogb/600/400','https://picsum.photos/seed/candelariabogc/600/400'],description:'Centro histórico colonial con museos y arte.',history:'Fundada en 1538. Calles empedradas y casas coloniales.\n\nPalacio de Nariño, Congreso, Catedral Primada, Museo del Oro, Museo Botero.\n\nPlaza de Bolívar: escenario de la independencia (1810).\n\nVibrante vida bohemia con cafés literarios y galerías.',curiosities:[{text:'Acta de Independencia firmada aquí en 1810.'},{text:'Universidades del siglo XVII.'},{text:'Más de 40 teatros.'},{text:'Chorro de Quevedo: fundación de Bogotá.'},{text:'Mayor concentración de museos de Colombia.'}],routes:[{name:'Ruta de Museos',duration:'3 h',distance:'2 km',difficulty:'Fácil'},{name:'Tour Grafiti y Arte',duration:'2.5 h',distance:'3 km',difficulty:'Fácil'},{name:'Ruta de la Independencia',duration:'2 h',distance:'2.5 km',difficulty:'Fácil'}],restaurants:[{name:'La Puerta Falsa',cuisine:'Bogotana (desde 1816)',rating:4.6},{name:'Quinua y Amaranto',cuisine:'Colombiana de autor',rating:4.5},{name:'Capital Cocina',cuisine:'Café y brunch',rating:4.4}]},
  {id:'museo-del-oro',name:'Museo del Oro',city:'Bogotá',rating:4.8,category:'historia',mainImage:'https://picsum.photos/seed/museodeorobog/800/500',photos:['https://picsum.photos/seed/museodeorobog/600/400','https://picsum.photos/seed/museodeoroboga/600/400','https://picsum.photos/seed/museodeorobogb/600/400','https://picsum.photos/seed/museodeorobogc/600/400'],description:'55,000+ piezas de orfebrería precolombina.',history:'La colección de orfebrería prehispánica más importante del mundo.\n\nFundado en 1939 con el Poporo Quimbaya (siglo I).\n\nLa Sala de la Ofrenda ilumina gradualmente miles de piezas de oro.\n\n500,000+ visitantes/año. Gratis los domingos.',curiosities:[{text:'55,000+ piezas de oro precolombino.'},{text:'Poporo Quimbaya: 2,000+ años.'},{text:'Gratis todos los domingos.'},{text:'Sala de la Ofrenda: efecto lumínico mágico.'},{text:'500,000+ visitantes anuales.'}],routes:[{name:'Recorrido Guiado',duration:'2 h',distance:'0.8 km',difficulty:'Fácil'},{name:'Oro + La Candelaria',duration:'3 h',distance:'2.5 km',difficulty:'Fácil'},{name:'Tour Nocturno',duration:'1.5 h',distance:'0.5 km',difficulty:'Fácil'}],restaurants:[{name:'Madre',cuisine:'Contemporánea',rating:4.6},{name:'Leo Cocina y Cava',cuisine:'Alta cocina',rating:4.8},{name:'Mini-Mal',cuisine:'Ingredientes nativos',rating:4.7}]},
  {id:'hoyo-soplador',name:'Hoyo Soplador',city:'San Andrés',rating:4.4,category:'naturaleza',mainImage:'https://picsum.photos/seed/hoyosoplador/800/500',photos:['https://picsum.photos/seed/hoyosoplador/600/400','https://picsum.photos/seed/hoyosopladora/600/400','https://picsum.photos/seed/hoyosopladorb/600/400','https://picsum.photos/seed/hoyosopladorc/600/400'],description:'Géiser marino natural de hasta 20 metros.',history:'Formación geológica en el extremo sur. Chorros de agua de hasta 20m.\n\nCavernas submarinas canalizan la presión del oleaje.\n\nPunto de encuentro cultural con artesanías raizales y reggae.\n\nMás espectacular entre noviembre y enero.',curiosities:[{text:'Chorros hasta 20 metros de altura.'},{text:'Géiser natural impulsado por las olas.'},{text:'Tradición de reggae raizal.'},{text:'Más espectacular nov-ene.'},{text:'El rondón de aquí: el mejor de la isla.'}],routes:[{name:'Sur de la Isla',duration:'2 h',distance:'8 km',difficulty:'Fácil'},{name:'Moto por la Costa',duration:'3 h',distance:'25 km',difficulty:'Fácil'},{name:'Caminata Costera',duration:'1.5 h',distance:'3 km',difficulty:'Fácil'}],restaurants:[{name:'Miss Celia',cuisine:'Raizal',rating:4.5},{name:'La Regatta',cuisine:'Mariscos',rating:4.6},{name:'Fisherman Place',cuisine:'Pescados',rating:4.3}]},
  {id:'acuario-natural',name:'Acuario Natural',city:'San Andrés',rating:4.5,category:'naturaleza',mainImage:'https://picsum.photos/seed/acuariosai/800/500',photos:['https://picsum.photos/seed/acuariosai/600/400','https://picsum.photos/seed/acuariosaia/600/400','https://picsum.photos/seed/acuariosaib/600/400','https://picsum.photos/seed/acuariosaic/600/400'],description:'Piscina natural con mantarrayas y peces tropicales.',history:'West View: piscina natural formada por coral.\n\nNadar con mantarrayas y peces ángel. "Mar de los Siete Colores".\n\nTrampolín sobre el mar y plataformas flotantes.\n\nComunidad raizal guardiana del ecosistema.',curiosities:[{text:'Los famosos "siete colores" del mar.'},{text:'Mantarrayas a menos de un metro.'},{text:'Visibilidad +30 metros.'},{text:'Coral como barrera natural.'},{text:'Comunidad raizal protege el ecosistema.'}],routes:[{name:'Snorkel Acuario',duration:'2 h',distance:'1 km',difficulty:'Fácil'},{name:'Acuario + Haynes Cay',duration:'4 h',distance:'5 km',difficulty:'Fácil'},{name:'Buceo con Instructor',duration:'1.5 h',distance:'0.5 km',difficulty:'Moderada'}],restaurants:[{name:'West View',cuisine:'Raizal',rating:4.3},{name:"Niko's Seafood",cuisine:'Langosta',rating:4.5},{name:'El Paraíso',cuisine:'Ceviche isleño',rating:4.2}]},
  {id:'johnny-cay',name:'Johnny Cay',city:'San Andrés',rating:4.6,category:'naturaleza',mainImage:'https://picsum.photos/seed/johnnycay/800/500',photos:['https://picsum.photos/seed/johnnycay/600/400','https://picsum.photos/seed/johnnycaya/600/400','https://picsum.photos/seed/johnnycayb/600/400','https://picsum.photos/seed/johnnycayc/600/400'],description:'Islote paradisíaco con cocoteros.',history:'Islote Sucre: 1.5 ha a 1.5 km al norte. Parque Natural Regional desde 2001.\n\nCocoteros, arena blanca, aguas turquesa.\n\nAnidación de aves marinas e iguanas.\n\nLanchas rápidas: 10 minutos desde San Andrés.',curiosities:[{text:'1.5 ha, se recorre en 15 minutos.'},{text:'"Coco loco" famoso en toda Colombia.'},{text:'Colonia protegida de iguanas.'},{text:'Solo en lancha, 10 min.'},{text:'Reggae en vivo todos los días.'}],routes:[{name:'Paseo por el Cayo',duration:'1 h',distance:'0.8 km',difficulty:'Fácil'},{name:'Snorkel alrededor',duration:'1.5 h',distance:'1.5 km',difficulty:'Fácil'},{name:'Johnny Cay + Acuario',duration:'5 h',distance:'8 km',difficulty:'Fácil'}],restaurants:[{name:'Bar Coco Loco',cuisine:'Cócteles',rating:4.4},{name:'La Choza Isleña',cuisine:'Pescado frito',rating:4.3},{name:"Johnny's Grill",cuisine:'Parrilla caribeña',rating:4.1}]},
  {id:'plaza-mayor-vl',name:'Plaza Mayor',city:'Villa de Leyva',rating:4.7,category:'historia',mainImage:'https://picsum.photos/seed/plazamayorvl/800/500',photos:['https://picsum.photos/seed/plazamayorvl/600/400','https://picsum.photos/seed/plazamayorvla/600/400','https://picsum.photos/seed/plazamayorvlb/600/400','https://picsum.photos/seed/plazamayorvlc/600/400'],description:'La plaza empedrada más grande de Colombia.',history:'14,000 m² empedrados. Siglo XVI.\n\nFundada en 1572. Monumento Nacional desde 1954.\n\nPiedras de río pulidas, arquitectura colonial perfecta.\n\nFestival del Viento y las Cometas cada agosto.',curiosities:[{text:'14,000 m²: la más grande de Colombia.'},{text:'Piedras de río pulidas a mano.'},{text:'Festival de Cometas cada agosto.'},{text:'Monumento Nacional desde 1954.'},{text:'Fósiles de dinosaurios marinos cerca.'}],routes:[{name:'Tour Colonial',duration:'2 h',distance:'2 km',difficulty:'Fácil'},{name:'Ruta Museos',duration:'3 h',distance:'2.5 km',difficulty:'Fácil'},{name:'Bicicleta al Atardecer',duration:'1.5 h',distance:'5 km',difficulty:'Fácil'}],restaurants:[{name:'Savia',cuisine:'De autor',rating:4.6},{name:'Casa Quintero',cuisine:'Boyacense',rating:4.4},{name:'Mercado Municipal',cuisine:'De plaza',rating:4.3}]},
  {id:'desierto-candelaria',name:'Desierto de la Candelaria',city:'Villa de Leyva',rating:4.5,category:'naturaleza',mainImage:'https://picsum.photos/seed/desiertovl/800/500',photos:['https://picsum.photos/seed/desiertovl/600/400','https://picsum.photos/seed/desiertovla/600/400','https://picsum.photos/seed/desiertovlb/600/400','https://picsum.photos/seed/desiertovlc/600/400'],description:'Paisaje desértico con monasterio del s.XVII.',history:'Zona árida a 7 km de Villa de Leyva.\n\nMonasterio de la Candelaria (1597) aún habitado por monjes.\n\nFósiles de reptiles marinos de 100 millones de años.\n\n"Pozos Azules": lagunas de azul intenso.',curiosities:[{text:'Uno de los pocos desiertos andinos.'},{text:'Monasterio con monjes desde 1597.'},{text:'Fósiles de 100 millones de años.'},{text:'30+ especies de cactus endémicos.'},{text:'"Pozos Azules" de color natural intenso.'}],routes:[{name:'Al Monasterio',duration:'2 h',distance:'4 km',difficulty:'Moderada'},{name:'Ruta de Fósiles',duration:'3 h',distance:'5 km',difficulty:'Moderada'},{name:'Desierto + Pozos',duration:'4 h',distance:'8 km',difficulty:'Fácil'}],restaurants:[{name:'Del Monasterio',cuisine:'Monacal',rating:4.2},{name:'Casa de Adobe',cuisine:'Boyacense',rating:4.3},{name:'El Cactus',cuisine:'Parrilla',rating:4.1}]},
  {id:'pozo-azul',name:'Pozo Azul',city:'Villa de Leyva',rating:4.4,category:'naturaleza',mainImage:'https://picsum.photos/seed/pozoazul/800/500',photos:['https://picsum.photos/seed/pozoazul/600/400','https://picsum.photos/seed/pozoazula/600/400','https://picsum.photos/seed/pozoazulb/600/400','https://picsum.photos/seed/pozoazulc/600/400'],description:'Piscinas naturales de agua cristalina azul.',history:'Color azul por minerales como cobre y azufre.\n\nProcesos geológicos milenarios. Color varía según la luz.\n\nPropiedad privada abierta al turismo. Mejor al mediodía.\n\nNo aptos para nadar pero muy fotogénicos.',curiosities:[{text:'Color azul por cobre y azufre.'},{text:'Los más "instagrameados" de Boyacá.'},{text:'Mejor al mediodía con sol directo.'},{text:'No se permite nadar.'},{text:'Color cambia según la hora.'}],routes:[{name:'Sendero de los Pozos',duration:'1 h',distance:'1.5 km',difficulty:'Fácil'},{name:'Pozos + Desierto',duration:'4 h',distance:'10 km',difficulty:'Moderada'},{name:'Ciclopaseo Rural',duration:'2 h',distance:'6 km',difficulty:'Fácil'}],restaurants:[{name:'Doña Rosa',cuisine:'Campesina boyacense',rating:4.3},{name:'El Olivo',cuisine:'Mediterránea-andina',rating:4.5},{name:'La Gallina e la Polenta',cuisine:'Italiana rústica',rating:4.4}]},
  {id:'barranquilla-carnaval',name:'Carnaval de Barranquilla',city:'Barranquilla',rating:4.8,category:'historia',mainImage:'https://picsum.photos/seed/carnavalbarranq/800/500',photos:['https://picsum.photos/seed/carnavalbarranq/600/400','https://picsum.photos/seed/carnavalbarranqa/600/400','https://picsum.photos/seed/carnavalbarranqb/600/400','https://picsum.photos/seed/carnavalbarranqc/600/400'],description:'El carnaval más grande de Colombia, Patrimonio Inmaterial UNESCO.',history:'El Carnaval de Barranquilla es la fiesta más grande de Colombia y la segunda del mundo después del de Río de Janeiro.\n\nDeclarado Patrimonio Oral e Inmaterial de la Humanidad por la UNESCO en 2003.\n\nSe celebra cuatro días antes del Miércoles de Ceniza con desfiles, comparsas y disfraces.\n\nEs una fusión de tradiciones indígenas, africanas y europeas.',curiosities:[{text:'Patrimonio Inmaterial UNESCO desde 2003.'},{text:'Segundo carnaval más grande del mundo.'},{text:'4 días de fiesta antes de Cuaresma.'},{text:'Fusión de 3 culturas: indígena, africana, europea.'},{text:'La Batalla de Flores inaugura el carnaval.'}],routes:[{name:'Ruta del Carnaval',duration:'4 h',distance:'5 km',difficulty:'Fácil'},{name:'Museos del Carnaval',duration:'2 h',distance:'2 km',difficulty:'Fácil'},{name:'Barranquilla Nocturna',duration:'3 h',distance:'3 km',difficulty:'Fácil'}],restaurants:[{name:'La Cueva',cuisine:'Caribeña tradicional',rating:4.6},{name:'Restaurante Árabe',cuisine:'Árabe-barranquillera',rating:4.5},{name:'Salome Cocina',cuisine:'Fusión costeña',rating:4.4}]},
  {id:'barranquilla-bocas',name:'Bocas de Ceniza',city:'Barranquilla',rating:4.3,category:'naturaleza',mainImage:'https://picsum.photos/seed/bocasdecentza/800/500',photos:['https://picsum.photos/seed/bocasdecentza/600/400','https://picsum.photos/seed/bocasdecentzaa/600/400','https://picsum.photos/seed/bocasdecentzab/600/400','https://picsum.photos/seed/bocasdecentzac/600/400'],description:'Donde el río Magdalena se encuentra con el mar Caribe.',history:'Bocas de Ceniza es el punto exacto donde el río Magdalena desemboca en el mar Caribe.\n\nSe accede por un paseo en tren artesanal sobre los antiguos tajamares.\n\nEl espectáculo de las dos aguas (dulce y salada) es impresionante.\n\nPunto estratégico para el comercio desde la colonia.',curiosities:[{text:'Desembocadura del río más importante de Colombia.'},{text:'Paseo en tren artesanal sobre los tajamares.'},{text:'El agua dulce y salada se ven claramente.'},{text:'Punto comercial clave desde la colonia.'},{text:'Atardeceres espectaculares sobre el río.'}],routes:[{name:'Tren por los Tajamares',duration:'2 h',distance:'4 km',difficulty:'Fácil'},{name:'Tour Fluvial',duration:'3 h',distance:'10 km',difficulty:'Fácil'},{name:'Puesta de Sol',duration:'1.5 h',distance:'2 km',difficulty:'Fácil'}],restaurants:[{name:'El Muelle',cuisine:'Pescados de río',rating:4.3},{name:'Bocas Grill',cuisine:'Parrilla costeña',rating:4.2},{name:'Doña Lola',cuisine:'Casera barranquillera',rating:4.4}]},

  {id:'cali-cristo',name:'Cristo Rey',city:'Cali',rating:4.6,category:'historia',mainImage:'https://picsum.photos/seed/cristoreycali/800/500',photos:['https://picsum.photos/seed/cristoreycali/600/400','https://picsum.photos/seed/cristoreycalia/600/400','https://picsum.photos/seed/cristoreycalib/600/400','https://picsum.photos/seed/cristoreycalic/600/400'],description:'Monumento icónico de 26 metros sobre el Cerro de Los Cristales.',history:'El Cristo Rey de Cali es una estatua de 26 metros sobre el Cerro de Los Cristales.\n\nConstruido entre 1950 y 1953 como símbolo de fe y protección de la ciudad.\n\nVisible desde casi toda Cali con vista panorámica espectacular.\n\nFue dañado por un rayo y restaurado en 2003.',curiosities:[{text:'26 m de altura + 8 m de pedestal.'},{text:'Visible desde casi toda la ciudad.'},{text:'Inaugurado en 1953, año del de Río.'},{text:'Restaurado tras golpe de rayo en 2003.'},{text:'Vista 360° de toda Cali desde su base.'}],routes:[{name:'Subida al Cristo',duration:'2 h',distance:'3 km',difficulty:'Moderada'},{name:'Mirador Panorámico',duration:'1 h',distance:'1 km',difficulty:'Fácil'}],restaurants:[{name:'El Faro',cuisine:'Vallecaucana',rating:4.3},{name:'Sabor Caleño',cuisine:'Típica',rating:4.4}]},

/* ── SUITCASE LOGO ──────────────────────────────── */
function Logo({size=64,light=false}) {
  const c=light?'#fff':'#06B6D4';
  return (<svg width={size} height={size} viewBox="0 0 60 60" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <rect x="10" y="20" width="40" height="30" rx="4"/>
    <path d="M22 20V14a4 4 0 014-4h8a4 4 0 014 4v6"/>
    <line x1="10" y1="32" x2="50" y2="32"/>
    <line x1="30" y1="32" x2="30" y2="40"/>
    <rect x="26" y="36" width="8" height="4" rx="1" fill={light?'rgba(255,255,255,0.2)':'rgba(6,182,212,0.2)'}/>
  </svg>);
}

function Stars({rating,size=16,interactive=false,onChange}) {
  return (<div className="flex gap-0.5 items-center">
    {[1,2,3,4,5].map(s=>(<button key={s} disabled={!interactive} onClick={()=>interactive&&onChange&&onChange(s)} className={interactive?'cursor-pointer':'cursor-default'}>
      <I.star s={size} c={s<=Math.round(rating)?'#F59E0B':'#D1D5DB'} f={s<=Math.round(rating)?'#F59E0B':'none'}/>
    </button>))}
    {!interactive&&<span className="text-xs text-gray-400 ml-1 font-medium">{rating}</span>}
  </div>);
}
function Confetti(){const c=['#06B6D4','#0891B2','#F59E0B','#EF4444','#8B5CF6','#EC4899','#22D3EE','#FF6B6B'];return(<div className="fixed inset-0 pointer-events-none z-50">{Array.from({length:40},(_,i)=>i).map(i=>(<div key={i} className="absolute" style={{left:Math.random()*100+'%',top:'45%',width:5+Math.random()*8,height:5+Math.random()*8,backgroundColor:c[i%8],borderRadius:Math.random()>0.5?'50%':'2px',animation:'confettiPiece 1.4s ease '+Math.random()*0.6+'s forwards'}}/>))}</div>);}
function Toast({message,show}){return show?<div className="fixed bottom-24 left-1/2 -translate-x-1/2 glass-dark text-white px-5 py-2.5 rounded-2xl text-sm z-50 fade-in font-medium">{message}</div>:null;}

/* ── STAMP (passport style with lock) ── */
function StampBadge({city,collected,size=115,onTapLocked}){
  const s=CITY_STAMPS[city]||{emoji:'🌎',color:'#06B6D4',label:'MUNDO'};
  const img=STAMP_IMAGES[city];
  return(<div className={collected?'stamp-pop':''} style={{width:size,height:size,cursor:'pointer',position:'relative'}}
    onClick={()=>{if(onTapLocked)onTapLocked(city);}}>
    <div style={{width:size,height:size,borderRadius:14,overflow:'hidden',border:collected?'2px solid '+s.color:'2px dashed #D1D5DB',position:'relative'}}>
      {img
        ? <img src={img} alt={city} style={{width:'100%',height:'100%',objectFit:'cover',filter:collected?'none':'grayscale(0.6) brightness(0.65)'}}/>
        : <div style={{width:'100%',height:'100%',background:'#F3F4F6',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>{s.emoji}</div>
      }
      {collected&&<div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,'+s.color+'99)',padding:'6px 4px 4px',textAlign:'center'}}>
        <span style={{color:'white',fontSize:8,fontWeight:800,letterSpacing:1}}>EXPLORADO</span>
      </div>}
    </div>
    {!collected&&<div className="absolute inset-0 flex items-center justify-center" style={{background:'rgba(0,0,0,0.3)',borderRadius:14}}>
      <div className="bg-white/90 rounded-full p-2 shadow-md"><I.lock s={18} c="#9CA3AF"/></div>
    </div>}
  </div>);
}

/* ── STAMP PREVIEW MODAL ── */
function StampPreviewModal({city,show,onClose}){
  if(!show||!city)return null;
  const s=CITY_STAMPS[city]||{emoji:'🌎',color:'#06B6D4',label:'MUNDO'};
  const img=STAMP_IMAGES[city];
  return(<div className="fixed inset-0 z-50 flex items-center justify-center" onClick={onClose}>
    <div className="absolute inset-0 bg-black/60 backdrop-filter backdrop-blur-sm"/>
    <div className="relative bg-white rounded-3xl p-6 mx-6 max-w-[320px] w-full fade-in text-center" onClick={e=>e.stopPropagation()}>
      <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Estampita</p>
      <div className="flex justify-center mb-4 relative" style={{display:'inline-block'}}>
        <div style={{width:170,height:170,borderRadius:18,overflow:'hidden',border:'2px solid '+s.color+'60',position:'relative',margin:'0 auto'}}>
          {img
            ? <img src={img} alt={city} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            : <div style={{width:170,height:170,background:s.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:56}}>{s.emoji}</div>
          }
        </div>
        <div style={{position:'absolute',bottom:6,right:6,background:'rgba(0,0,0,0.45)',borderRadius:'50%',width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <I.lock s={14} c="white"/>
        </div>
      </div>
      <p className="text-xl font-black text-gray-800 mb-1">{city}</p>
      <div className="bg-gray-100 rounded-2xl p-4 mb-4 text-left">
        <p className="text-xs font-bold text-blue-900 mb-1">¿Cómo conseguirla?</p>
        <p className="text-xs text-blue-800 leading-relaxed">Visita alguno de los sitios turísticos de <strong>{city}</strong> y desbloquea tu estampita como recuerdo de tu aventura por Colombia.</p>
      </div>
      <button onClick={onClose} className="w-full py-3 rounded-2xl bg-gradient-to-r from-cyan-500 to-cyan-600 text-white font-semibold text-sm">Entendido</button>
    </div>
  </div>);
}

/* ── SAVE MODAL ── */
function SaveModal({show,onClose,onSave,placeName}){
  const [selected,setSelected]=useState(null);
  const [custom,setCustom]=useState('');
  if(!show)return null;
  return(<div className="fixed inset-0 z-50 flex items-end justify-center" onClick={onClose}>
    <div className="absolute inset-0 bg-black/50 backdrop-blur-sm"/>
    <div className="relative w-full max-w-[430px] bg-white rounded-t-3xl p-6 pb-8 fade-in" onClick={e=>e.stopPropagation()}>
      <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"/>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-lg font-bold text-gray-800">Guardar lugar</h3>
        <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center"><I.x s={16} c="#6B7280"/></button>
      </div>
      <p className="text-sm text-gray-500 mb-4">¿En qué categoría quieres guardar <span className="font-semibold text-gray-700">{placeName}</span>?</p>
      <div className="space-y-2 mb-4">
        {SAVE_CATEGORIES.map(cat=>(<button key={cat} onClick={()=>setSelected(cat)}
          className={'w-full flex items-center gap-3 px-4 py-3 rounded-xl border-2 transition-all '+(selected===cat?'border-cyan-500 bg-cyan-50':'border-gray-200 hover:border-gray-300')}>
          <I.folder s={18} c={selected===cat?'#06B6D4':'#9CA3AF'}/>
          <span className={'text-sm font-medium '+(selected===cat?'text-cyan-600':'text-gray-700')}>{cat}</span>
          {selected===cat&&<span className="ml-auto"><I.check s={18} c="#06B6D4"/></span>}
        </button>))}
      </div>
      <div className="flex gap-2 mb-4">
        <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="O crea una nueva..." className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-cyan-500"/>
        {custom.trim()&&<button onClick={()=>{setSelected(custom.trim());setCustom('');}} className="px-3 py-2.5 bg-cyan-500 text-white rounded-xl text-sm font-medium"><I.plus s={16} c="white"/></button>}
      </div>
      <button onClick={()=>{if(selected)onSave(selected);}} disabled={!selected}
        className={'w-full py-3.5 rounded-2xl font-semibold text-white transition-all '+(selected?'bg-gradient-to-r from-cyan-500 to-cyan-600 shadow-lg':'bg-gray-300')}>
        {selected?'Guardar en "'+selected+'"':'Selecciona una categoría'}
      </button>
    </div>
  </div>);
}

  case 'ar': return (
    <div style={{height:'100vh',background:'#000',position:'relative',overflow:'hidden',userSelect:'none'}} onMouseDown={arDown} onMouseMove={arMove} onMouseUp={arUp} onTouchStart={arDown} onTouchMove={arMove} onTouchEnd={arUp}>

        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 65% 80% at 50% 50%, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.62) 100%)'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(6,182,212,0.12) 0%,transparent 50%,rgba(139,92,246,0.08) 100%)'}}/>
        <div className="absolute inset-0 overflow-hidden pointer-events-none"><div className="absolute left-0 w-full h-px bg-cyan-400/30" style={{animation:'scanLine 5s linear infinite'}}/></div>

          <div key={i} className="absolute" style={{left:ov.left,top:ov.top,zIndex:20,transform:'translateX(-50%)'}}>

              <div className="pulse-pin w-9 h-9 rounded-full flex items-center justify-center" style={{background:'linear-gradient(135deg,#06B6D4,#22D3EE)'}}>

              <div className="mt-2 glass-dark rounded-2xl px-3 py-3 text-center" style={{width:'115px'}}>
                <p className="text-white text-[10px] font-bold leading-tight">{ov.p.name}</p>
                <div className="flex items-center justify-center gap-1 mt-1"><I.navigation s={10} c="#22D3EE" f="#22D3EE"/><span className="text-cyan-400 text-[10px] font-medium">{ov.dist}</span></div>
                <button onClick={e=>{e.stopPropagation();openDetail(ov.p);}} className="mt-2 bg-gradient-to-r from-cyan-500 to-cyan-600 text-white text-[10px] font-bold px-3 py-1.5 rounded-full">Ver más</button>
              </div>
            </div>
          </div>

    <div className="min-h-screen bg-gray-50 pb-24">
      <div className="bg-gradient-to-br from-cyan-500 to-cyan-600 px-6 pt-10 pb-8 rounded-b-[2rem]">
        <h2 className="text-white text-2xl font-bold fade-in">Hola {userName} <span className="inline-block">👋</span></h2>
        <p className="text-white/60 text-sm mt-1 fade-in-d1">¿Qué quieres explorar hoy?</p>
        <button onClick={()=>{setSelectedCity('Bogotá');showT('📍 Mostrando lugares cerca de ti · Bogotá');}} className="mt-4 bg-white/20 text-white text-sm font-medium px-4 py-2.5 rounded-xl flex items-center gap-2 fade-in-d2 border border-white/20">
          <I.crosshair s={16} c="white"/> Usar mi ubicación
        </button>
      </div>
      <div className="px-4 mt-6">
        <div className="flex items-center justify-between mb-3">
          <p className="text-gray-800 font-bold text-sm flex items-center gap-2"><I.map s={16} c="#06B6D4"/> Elige tu destino</p>
          {!selectedCity&&<button onClick={()=>setCityView(v=>v==='carousel'?'list':'carousel')} className="text-xs font-semibold text-cyan-600 bg-cyan-50 px-3 py-1 rounded-full">
            {cityView==='carousel'?'Ver listado':'Ver carrusel'}
          </button>}
        </div>
        {!selectedCity ? (
          cityView==='carousel' ? (
            /* CAROUSEL VIEW */
            <div>
              <div className="overflow-x-auto scrollbar-hide -mx-4 px-4" style={{scrollSnapType:'x mandatory',display:'flex',gap:12}}>
                {CITIES.map((c,idx)=>(
                  <div key={c} style={{scrollSnapAlign:'start',flexShrink:0,width:'calc(100vw - 64px)',maxWidth:360}} onClick={()=>setSelectedCity(c)} className="cursor-pointer">
                    <div className="relative rounded-3xl overflow-hidden card-hover" style={{height:380}}>
                      <div className="absolute inset-0 bg-img" style={{backgroundImage:'url('+CITY_IMAGES[c]+')'}}/>
                      <div className="absolute inset-0" style={{background:'linear-gradient(to bottom,rgba(0,0,0,0.05) 0%,rgba(0,0,0,0.7) 100%)'}}/>
                      <div className="absolute bottom-0 left-0 right-0 p-6">
                        <p className="text-white text-2xl font-black mb-1">{c}</p>
                        <p className="text-white/60 text-sm">{PLACES.filter(p=>p.city===c).length} sitios turísticos</p>
                        <div className="mt-4 inline-flex items-center gap-2 bg-white/20 text-white text-xs font-semibold px-4 py-2 rounded-full border border-white/30">
                          <I.mapPin s={12} c="white"/> Explorar
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <p className="text-center text-gray-400 text-[10px] mt-3 font-medium">← Desliza para explorar →</p>
            </div>
          ) : (
            /* LIST VIEW */
            <div className="grid grid-cols-2 gap-3">
              {CITIES.map(c=>(
                <button key={c} onClick={()=>setSelectedCity(c)} className="h-44 rounded-2xl overflow-hidden relative card-hover">
                  <div className="absolute inset-0 bg-img" style={{backgroundImage:'url('+CITY_IMAGES[c]+')'}}/>
                  <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"/>
                  <div className="absolute bottom-0 left-0 right-0 p-3">
                    <p className="text-white text-sm font-bold">{c}</p>
                    <p className="text-white/50 text-[10px] mt-0.5">{PLACES.filter(p=>p.city===c).length} lugares</p>
                  </div>
                </button>
              ))}
            </div>
          )
        ) : (
          /* City selected: text-only chips + places list */
          <div>
            <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-3 -mx-1 px-1">
              {CITIES.map(c=>(
                <button key={c} onClick={()=>setSelectedCity(c)}
                  className={'flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-bold transition-all '+(selectedCity===c?'bg-cyan-500 text-white shadow-md shadow-cyan-500/30':'bg-gray-100 text-gray-600 hover:bg-gray-200')}>
                  {c}
                </button>
              ))}
            </div>
            <div className="space-y-4 mt-4 fade-in">
              <div className="flex items-center justify-between">
                <p className="text-gray-800 font-bold text-sm flex items-center gap-2"><I.mapPin s={16} c="#06B6D4"/> {selectedCity}</p>
                <button onClick={()=>setSelectedCity(null)} className="text-xs text-cyan-600 font-medium">Ver todos</button>
              </div>
              {PLACES.filter(p=>p.city===selectedCity).map(place=>(<div key={place.id} onClick={()=>openDetail(place)} className="bg-white rounded-2xl overflow-hidden shadow-sm card-hover cursor-pointer border border-gray-100">
                <div className="relative h-36 bg-img bg-gray-200" style={{backgroundImage:'url('+place.mainImage+')'}}>
                  <div className="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"/>
                  <div className="absolute bottom-2 left-3 right-3">
                    <h3 className="text-white font-bold text-sm leading-tight">{place.name}</h3>
                  </div>
                  <div className="absolute top-2 right-2 flex gap-1.5">
                    <button onClick={e=>{e.stopPropagation();if(favorites[place.id]){removeFav(place.id);showT('Eliminado');}else{handleSave(place.id,place.name);}}} className="w-7 h-7 rounded-full bg-black/30 backdrop-blur-sm flex items-center justify-center">
                      <I.heart s={12} c={favorites[place.id]?'#FF6B6B':'white'} f={favorites[place.id]?'#FF6B6B':'none'}/>
                    </button>
                  </div>
                </div>
                <div className="px-3 py-2 flex items-center justify-between">
                  <p className="text-gray-400 text-xs truncate max-w-[180px]">{place.description}</p>
                  <Stars rating={place.rating} size={12}/>
                </div>
              </div>))}
            </div>
          </div>
        )}
      </div>
    </div>);

  /* ═══ DETAIL ═══ */
  case 'detail':{
    if(!selectedPlace)return null;const p=selectedPlace;
    const tabs=['Historia','Datos','Rutas','Fotos','Restaurantes'];
    const reviews=[...REVIEWS,...(userReviews[p.id]||[])];
    return(<div className="min-h-screen bg-gray-50 pb-24">
      <div className="relative h-72 bg-img bg-gray-300" style={{backgroundImage:'url('+p.mainImage+')'}}>
        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-black/10"/>
        <div className="absolute top-4 left-4 z-10"><button onClick={()=>nav(prevRef.current==='ar'?'ar':'explore')} className="w-10 h-10 glass rounded-full flex items-center justify-center"><I.back s={20} c="white"/></button></div>
        <div className="absolute top-4 right-4 flex gap-2 z-10">
          <button onClick={()=>{if(favorites[p.id]){removeFav(p.id);showT('Eliminado');}else handleSave(p.id,p.name);}} className="w-10 h-10 glass rounded-full flex items-center justify-center"><I.heart s={18} c={favorites[p.id]?'#FF6B6B':'white'} f={favorites[p.id]?'#FF6B6B':'none'}/></button>
          <button onClick={()=>showT('Link copiado ✓')} className="w-10 h-10 glass rounded-full flex items-center justify-center"><I.share s={18} c="white"/></button>
        </div>
        <div className="absolute bottom-4 left-4 right-4">
          <p className="text-white/60 text-xs font-medium mb-1">{p.city}</p>
          <h1 className="text-white text-2xl font-black mb-2">{p.name}</h1>
          <Stars rating={p.rating} size={14}/>
        </div>
      </div>
      <div className="bg-white border-b border-gray-100 sticky top-0 z-10"><div className="flex overflow-x-auto scrollbar-hide">
        {tabs.map((t,i)=>(<button key={t} onClick={()=>setDetailTab(i)} className={'flex-shrink-0 px-5 py-3.5 text-xs font-semibold transition-colors border-b-2 '+(detailTab===i?'text-cyan-600 border-cyan-500':'text-gray-400 border-transparent')}>{t}</button>))}
      </div></div>
      <div className="px-4 pt-4">
        {detailTab===0&&<div className="fade-in space-y-3">{p.history.split('\n\n').map((para,i)=><p key={i} className="text-gray-600 text-sm leading-relaxed">{para}</p>)}</div>}
        {detailTab===1&&<div className="fade-in space-y-2.5">{p.curiosities.map((c,i)=><div key={i} className="bg-white rounded-2xl p-4 shadow-sm flex items-start gap-3 border border-gray-100"><div className="w-8 h-8 rounded-full bg-cyan-50 flex items-center justify-center flex-shrink-0"><I.star s={14} c="#06B6D4"/></div><p className="text-gray-600 text-sm">{c.text}</p></div>)}</div>}
        {detailTab===2&&<div className="fade-in space-y-2.5">{p.routes.map((r,i)=><div key={i} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100"><h4 className="font-bold text-gray-800 text-sm mb-2">{r.name}</h4><div className="flex gap-4 text-xs text-gray-500"><span className="flex items-center gap-1"><I.clock s={12} c="#9CA3AF"/>{r.duration}</span><span className="flex items-center gap-1"><I.navigation s={12} c="#9CA3AF"/>{r.distance}</span><span className={'font-semibold '+(r.difficulty==='Fácil'?'text-emerald-600':r.difficulty==='Moderada'?'text-amber-500':'text-coral')}>{r.difficulty}</span></div></div>)}</div>}
        {detailTab===3&&<div className="fade-in grid grid-cols-2 gap-2">{p.photos.map((ph,i)=><div key={i} className="w-full h-36 rounded-2xl bg-img bg-gray-200" style={{backgroundImage:'url('+ph+')'}}/>)}</div>}
        {detailTab===4&&<div className="fade-in space-y-2.5">{p.restaurants.map((r,i)=><div key={i} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between"><div><h4 className="font-bold text-gray-800 text-sm">{r.name}</h4><p className="text-xs text-gray-400 mt-0.5">{r.cuisine}</p></div><Stars rating={r.rating} size={12}/></div>)}</div>}
      </div>
      {/* Reviews */}
      <div className="px-4 mt-8">
        <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><I.star s={16} c="#F59E0B" f="#F59E0B"/> Reseñas</h3>
        <div className="space-y-2.5 mb-4">{reviews.map((r,i)=>(
          <div key={i} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <div className="flex items-center gap-2 mb-2"><div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-cyan-600 flex items-center justify-center text-white font-bold text-xs">{r.name.charAt(0)}</div><div className="flex-1"><p className="text-xs font-bold text-gray-800">{r.name}</p><p className="text-[10px] text-gray-400">{r.date}</p></div><Stars rating={r.rating} size={10}/></div>
            <p className="text-xs text-gray-500 leading-relaxed">{r.comment}</p>
          </div>))}</div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <p className="text-sm font-bold text-gray-800 mb-2">Tu reseña</p>
          <Stars rating={reviewRating} size={22} interactive onChange={setReviewRating}/>
          <textarea value={reviewText} onChange={e=>setReviewText(e.target.value)} placeholder="¿Qué te pareció?" className="w-full mt-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-cyan-500 resize-none h-20"/>
          <button onClick={()=>submitReview(p.id)} disabled={!reviewText.trim()||reviewRating===0} className={'mt-2 w-full py-3 rounded-xl text-sm font-bold text-white transition-all '+(reviewText.trim()&&reviewRating>0?'bg-gradient-to-r from-cyan-500 to-cyan-600':'bg-gray-200 cursor-not-allowed')}>Publicar</button>
        </div>
      </div>
      {/* Stamp */}
      <div className="px-4 mt-8 mb-8">
        <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-3xl p-6 text-center relative overflow-hidden">
          <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full -translate-y-1/2 translate-x-1/2"/>
          <p className="text-lg font-black text-white mb-1 flex items-center justify-center gap-2"><I.award s={20} c="#22D3EE"/> ¡Lugar explorado!</p>
          <p className="text-xs text-white/40 mb-4">Desbloquea esta estampita para tu colección</p>
          <div className="flex justify-center mb-4"><StampBadge city={p.city} collected={stamps.has(p.id)} size={120}/></div>
          <button onClick={()=>setStampPreview(p.city)} className="glow bg-gradient-to-r from-cyan-500 to-cyan-600 text-white font-bold px-8 py-3.5 rounded-2xl">Ver mi estampita</button>
        </div>
      </div>
    </div>);}

  /* ═══ FAVORITES ═══ */
  case 'favorites':{
    const favP=PLACES.filter(p=>favorites[p.id]);
    const allCities=[...new Set(PLACES.map(p=>p.city))];
    return(<div className="min-h-screen bg-gray-50 pb-24">
      <div className="bg-gradient-to-br from-cyan-500 to-cyan-600 px-6 pt-10 pb-8 rounded-b-[2rem]">
        <h2 className="text-white text-2xl font-bold flex items-center gap-2"><I.bookmark s={22} c="white"/> Mi Mochila</h2>
        <p className="text-white/60 text-sm mt-1">{favP.length} guardados · {stamps.size} estampitas</p>
      </div>
      <div className="px-4 mt-6">
        <h3 className="font-bold text-gray-800 text-sm mb-3 flex items-center gap-2"><I.heart s={16} c="#FF6B6B"/> Guardados</h3>
        {favP.length===0?<div className="text-center py-10"><I.heart s={40} c="#E5E7EB"/><p className="text-sm text-gray-400 mt-3">Aún no has guardado lugares</p></div>:
          <div className="space-y-2.5 mb-6">{favP.map(p=>(
            <div key={p.id} onClick={()=>openDetail(p)} className="bg-white rounded-2xl p-3 shadow-sm flex items-center gap-3 cursor-pointer card-hover border border-gray-100">
              <div className="w-16 h-16 rounded-xl bg-img bg-gray-200 flex-shrink-0" style={{backgroundImage:'url('+p.mainImage+')'}}/>
              <div className="flex-1 min-w-0"><h4 className="font-bold text-gray-800 text-sm truncate">{p.name}</h4><p className="text-xs text-gray-400">{p.city}</p><span className="inline-block mt-1 text-[10px] font-medium text-cyan-600 bg-cyan-50 px-2 py-0.5 rounded-full">{favorites[p.id]}</span></div>
            </div>))}</div>}
        {/* Stamps collection */}
        <h3 className="font-bold text-gray-800 text-sm mb-3 mt-6 flex items-center gap-2"><I.award s={16} c="#F59E0B"/> Estampitas</h3>
        <p className="text-xs text-gray-400 mb-4">{stamps.size} de {allCities.length} desbloqueadas · Explora lugares para desbloquear</p>
        <div className="grid grid-cols-3 gap-3">{allCities.map(city=>{
          const collected=PLACES.filter(p=>p.city===city&&stamps.has(p.id)).length>0;
          return(<div key={city} className="flex flex-col items-center cursor-pointer" onClick={()=>{if(collected){const p=PLACES.find(x=>x.city===city&&stamps.has(x.id));if(p)openDetail(p);}else{setStampPreview(city);}}}>
            <StampBadge city={city} collected={collected} size={110} onTapLocked={(c)=>setStampPreview(c)}/>
          </div>);
        })}</div>
      </div>
    </div>);}

  /* ═══ PROFILE ═══ */
  case 'profile': return(
    <div className="min-h-screen bg-gray-50 pb-24">
      <div className="bg-gradient-to-br from-cyan-500 to-cyan-600 px-6 pt-10 pb-10 rounded-b-[2rem] text-center relative overflow-hidden">
        <div className="absolute top-0 left-0 w-40 h-40 bg-white/5 rounded-full -translate-x-1/2 -translate-y-1/2"/>
        <div className="absolute bottom-0 right-0 w-32 h-32 bg-white/5 rounded-full translate-x-1/2 translate-y-1/2"/>
        <div className="w-20 h-20 rounded-full bg-white/20 mx-auto flex items-center justify-center text-3xl font-black text-white mb-3 border-2 border-white/30">{(userName||'?').charAt(0).toUpperCase()}</div>
        <h2 className="text-white text-xl font-bold">{userName||'Viajero'}</h2>
        <p className="text-white/60 text-sm mt-1">Explorador de Colombia</p>
      </div>
      <div className="px-4 mt-10">
        <div className="grid grid-cols-3 gap-3 mb-6">
          <div className="bg-white rounded-2xl p-4 text-center shadow-sm border border-gray-100"><p className="text-2xl font-black text-cyan-500">{Object.keys(favorites).length}</p><p className="text-[10px] text-gray-400 mt-1 font-medium">Guardados</p></div>
          <div className="bg-white rounded-2xl p-4 text-center shadow-sm border border-gray-100"><p className="text-2xl font-black text-cyan-600">{stamps.size}</p><p className="text-[10px] text-gray-400 mt-1 font-medium">Estampitas</p></div>
          <div className="bg-white rounded-2xl p-4 text-center shadow-sm border border-gray-100"><p className="text-2xl font-black text-amber-500">{Object.values(userReviews).flat().length}</p><p className="text-[10px] text-gray-400 mt-1 font-medium">Reseñas</p></div>
        </div>
        <h3 className="font-bold text-gray-800 text-sm mb-3">Mis intereses</h3>
        <div className="flex flex-wrap gap-2 mb-6">{userPrefs.map(pr=>{const o=PREF_OPTIONS.find(x=>x.id===pr);return o?<span key={pr} className="bg-cyan-50 text-cyan-600 text-xs font-semibold px-4 py-2 rounded-full">{o.label}</span>:null;})}{userPrefs.length===0&&<p className="text-sm text-gray-400">Sin preferencias</p>}</div>
      </div>
    </div>);
  default:return null;}}

  return(
    <div className="min-h-screen bg-gray-900 flex items-start justify-center">
      <div ref={scrollRef} className="relative w-full max-w-[430px] min-h-screen bg-gray-50 shadow-2xl overflow-hidden" style={{maxHeight:'100vh',overflowY:'auto'}}>
        <div className={'transition-all duration-200 '+(transitioning?'opacity-0 scale-[0.98]':'opacity-100 scale-100')}>{renderScreen()}</div>
        <Toast message={toast} show={!!toast}/>
        {showConfetti&&<Confetti/>}
        <SaveModal show={saveModal.show} placeName={saveModal.placeName} onClose={()=>setSaveModal({show:false,placeId:null,placeName:''})} onSave={confirmSave}/>
        <StampPreviewModal city={stampPreview} show={!!stampPreview} onClose={()=>setStampPreview(null)}/>
        {showNav&&(<div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white/90 backdrop-blur-xl border-t border-gray-200/50 flex z-40">
          {[{id:'splash',icon:I.home,label:'Inicio'},{id:'explore',icon:I.search,label:'Explorar'},{id:'favorites',icon:I.heart,label:'Guardados'},{id:'profile',icon:I.user,label:'Perfil'}].map(tab=>(
            <button key={tab.id} onClick={()=>nav(tab.id)} className={'flex-1 flex flex-col items-center py-3 transition-colors '+(screen===tab.id?'text-cyan-500':'text-gray-400')}>
              <tab.icon s={20} c={screen===tab.id?'#06B6D4':'#9CA3AF'}/><span className="text-[10px] font-semibold mt-1">{tab.label}</span>
            </button>))}
        </div>)}
      </div>
    </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
